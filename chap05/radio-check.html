<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>레드향 주문하기</title>
  </head>
  <body>
    <h1>레드향 주문하기</h1>
    <form>
      <fieldset>
        <legend><b>주문자 정보</b></legend>
        <label>주문자 ID <input type="text" name="userid"/></label>
      </fieldset>
      <fieldset>
        <legend>상품 선택</legend>
        <!-- Do it! 라디오 버튼과 체크 박스를 사용한 폼 만들기 -->
        <p><b>주문할 상품을 선택해 주세요.</b></p>
        <!--그룹은 name으로 해줌-->
        <ul>
          <li>
            <input type="checkbox"  name="order" id="p3" /><label for="p3">선물용 3kg
              <input type="number" min="0" max="5">(개)[최대 5개]
            </label>
          </li>
          <li>
            <input type="checkbox" name="order" id="p5" /><label for="p5">선물용 5kg
              <input type="number" min="1" max="3">(개)[최대 3개]
            </label>
          </li>
          <li>
            <input type="checkbox"  name="order" id="h3" /><label for="h3">가정용 3kg
              <input type="number" min="0" max="5">(개)[최대 5개]
            </label>
          </li>
          <li>
            <input type="checkbox"  name="order" id="h5" /><label for="h5">가정용 5kg
              <input type="number" min="1" max="3">(개)[최대 3개]
            </label>
            </label>
          </li>
        </ul>
        <p><b>포장 선택</b></p>
        <ul>
          <li><label><input type="radio" name="gift" value="yes">선물 포장</label></li>
          <li></label><input type="radio" name="gift" value="no">선물 포장 안함</label></li>
        </ul>
      </fieldset>

      <fieldset>
        <legend><b>배송 정보</b></legend>
        <ul>
          <li>
            <label for="user-name">이름 </label>
            <input type="text" id="user-name" />
          </li>
          <li>
            <label for="addr">배송 주소</label>
            <input type="text" id="addr" />
          </li>
          <li>
            <label for="mail">메일 주소</label>
            <input type="email" id="mail" />
          </li>
          <li>
            <label for="phone">연락처</label>
            <input type="tel" id="phone" />
          </li>
        </ul>
      </fieldset>
    </form>
  </body>
</html>
