<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>letter-spacing</title>
    <style>
      p {
        font-size: 20px;
      }
      /* Do it! 글자 간격 조절하기 */
      /*.넴챠ㅜㅎ1 {
      ㅣㄷㅅㅅㄷㄱ-ㅁ챠: 0.2드
     }*/
      .spacing1 {
        letter-spacing: 0.02e1em;
      }
      .spacing2 {
        letter-spacing: 0.5em;
      }
    </style>
  </head>
  <body>
    <p style="word-spacing: 50e-2em; letter-spacing: 0.2em">
      CSS : Casacdaing Style Sheet
    </p>
    <p class="spacing1">CSS</p>
    <p class="spacing2">CSS</p>
  </body>
</html>
