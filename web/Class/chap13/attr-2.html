<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>속성 선택자</title>
    <style>
      ul {
        list-style: none;
      }
      li {
        padding: 5px 30px;
      }
      li a {
        font-size: 16px;
        text-decoration: none;
        color: #000;
      }

      a[target="_blank"] {
        padding: 30px;
        background: url(./images/newwindow.png) no-repeat center right;
      }
      /* Do it! target 속성 값이 _blank인 a 요소(a[target='blank'])에만 스타일(오른쪽패딩, 배경이미지 newwindow.png를 오른쪽 영역에 배치) 지정하기 */
    </style>
  </head>

  <body>
    <ul>
      <li><a href="hhttps://html.spec.whatwg.org" target="_blank">HTML</a></li>
      <li>
        <a href="https://www.w3.org/TR/selectors">CSS Selector Level 3</a>
      </li>
      <li><a href="https://www.w3.org/TR/css3-mediaqueries">미디어쿼리</a></li>
    </ul>
  </body>
</html>
