<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울의 궁 - 경복궁 (Flexbox 버전)</title>
<style>
    * { box-sizing: border-box; }

    body {
        font-family: 'Malgun Gothic', sans-serif;
        padding: 10px;
        background: #fdfcf5;
        margin: 0;
    }

    /* Header */
    .header {
        padding: 80px 30px;
        text-align: center;
        background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url("./images/Gyeongbokgung_Palace_with_blue_sky_in_Seoul.jpg"); 
        background-size: cover;
        background-position: center 40%;
        color: white;
        text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    }

    /* Navigation Bar - Flexbox 적용 */
    .topnav {
        background-color: #1a2a3a;
        position: sticky;
        top: 0;
        z-index: 1000;
        display: flex; /* 네비게이션 항목 정렬 */
        justify-content: flex-start;
    }

    .topnav a {
        color: #f2f2f2;
        padding: 16px 20px;
        text-decoration: none;
        transition: 0.3s;
    }

    .topnav a:hover { background-color: #c6a05e; }
    .topnav a.login { margin-left: auto; } /* 로그인 버튼만 오른쪽 끝으로 밀기 */

    /* Main Layout - Flexbox 적용 */
    .row {
        display: flex;
        flex-wrap: wrap;
        gap: 20px; /* 칼럼 간격 */
        margin-top: 20px;
    }

    .leftcolumn { flex: 7; min-width: 300px; }
    .rightcolumn { flex: 3; min-width: 250px; }

    /* Card & Image */
    .card {
        background-color: white;
        padding: 25px;
        margin-bottom: 20px;
        border: 1px solid #e6e6e6;
        border-radius: 8px;
    }

    .card img {
        width: 100%;
        height: auto;
        border-radius: 4px;
    }

    .card h2 {
        font-size: 28px;
        color: #1a2a3a;
        border-left: 5px solid #c6a05e;
        padding-left: 15px;
    }

    /* Footer */
    .footer {
        padding: 30px;
        text-align: center;
        background: #1a2a3a;
        color: #aaa;
        margin-top: 10px;
    }

    /* 모바일 대응 (반응형 추가) */
    @media screen and (max-width: 800px) {
        .row {
            flex-direction: column; /* 화면이 작아지면 위아래로 배치 */
        }
    }
</style>
</head>
<body>

<div class="header">
  <h1>서울의 궁</h1>
  <p>전통과 현대가 공존하는 조선의 법궁, 경복궁</p>
</div>

<div class="topnav">
  <a href="#">경복궁 소개</a>
  <a href="#">관람안내</a>
  <a href="#">행사일정</a>
  <a href="#" class="login">로그인</a>
</div>

<div class="row">
  <div class="leftcolumn">
    <div class="card">
      <h2>법궁의 위엄, 근정전(勤政殿)</h2>
      <img src="./images/Gyeongbokgung_Palace_with_blue_sky_in_Seoul.jpg" alt="경복궁 근정전">
      <p style="line-height: 1.8; margin-top: 20px;">
        <strong>근정전</strong>은 경복궁의 정전으로, 국가의 공식 행사가 거행되던 곳입니다.
      </p>
    </div>

    <div class="card">
      <h2>연회의 장소, 경회루(慶會樓)</h2>
      <img src="./images/Gyonghoeuru.jpg" alt="경회루">
      <p style="line-height: 1.8; margin-top: 20px;">
        봄바람에 흩날리는 벚꽃과 어우러진 <strong>경회루</strong>는 경복궁의 백미입니다.
      </p>
    </div>
  </div>

  <div class="rightcolumn">
    <div class="card">
      <h3>궁궐 소식</h3>
      <p>야간 관람 예매가 진행 중입니다.</p>
    </div>
    <div class="card">
      <h3>주요 궁궐</h3>
      <ul>
        <li>창덕궁</li>
        <li>창경궁</li>
        <li>덕수궁</li>
      </ul>
    </div>
  </div>
</div>

<div class="footer">
  <p>(03045) 서울특별시 종로구 사직로 161</p>
</div>

</body>
</html>
