<!doctype html>
<html>
  <head>
    <style>
      /* 1. 모든 요소의 여백을 초기화하고 박스 크기 계산 방식 설정 */
      * {
        margin: 0;
        box-sizing: border-box;
      }

      /* 2. 네비게이션 바를 플렉스 박스로 설정 */
      .navbar {
        display: flex;
        /* 항목들을 양쪽 끝으로 배치, 로고는 왼쪽, 메뉴는 오른쪽으로 배치 */
        justify-content: space-between;
        align-items: center;
        background-color: #333;
        padding: 10px 20px;
      }

      /* 3. 메뉴 리스트 내부의 불필요한 점을 없애고 가로로 나열 */
      .nav-menu {
        display: flex;
        list-style-type: none; /* 리스트 스타일 기호 제거 */
      }

      /* 4. 메뉴 항목 사이의 간격 제공 */
      .nav-menu li {
        margin: 5px 20px;
        color: white;
      }

      /* 5. 메인 본문 영역 설정 */
      .main-container {
        display: flex;
        /* 화면이 좁아지면 아이템들은 아래 줄로 떨어짐 */
        flex-wrap: wrap;
        gap: 20px;
        padding: 20px;
        min-height: 80vh;
      }

      /* 6. 왼쪽 포스트 영역: 남은 공간을 3의 비율로 차지하도록 지정 */
      .post-section {
        flex: 3 1 0;
        background-color: rgb(177, 177, 177);
      }

      /* 7. 오른쪽 사이드바: 고정된 기본 너비를 250px로 설정 */
      .sidebar {
        flex-basis: 250px;
        background-color: #eee;
      }

      /* 8. 클래스가 'highlight'인 요소만 글자색을 주황색으로 바꾸기 */
      .highlight {
        color: orange;
        font-weight: bold;
      }

      /* 9. 마우스를 올렸을 때 버튼의 배경색을 바꾸기 */
      .btn:hover {
        background-color: #555;
        color: white;
      }

      /* 10. 링크 밑줄 없애고 글자색을 흰색으로 바꾸기 */
      .nav-menu li a {
        text-decoration: none;
        color: white;
      }

      /* 11. 마우스를 올렸을 때 링크의 오렌지색으로 바꾸기 */
      .nav-munu li a:hover {
        color: orange;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <h1 class="highlight">MyTravel</h1>
      <ul class="nav-menu">
        <li><a href="#">홈</a></li>
        <li><a href="#">여행지</a></li>
        <li class="btn">로그인</li>
      </ul>
    </nav>

    <div class="main-container">
      <section class="post-section">본문 내용이 들어갑니다.</section>
      <aside class="sidebar">사이드바 광고/링크</aside>
    </div>
  </body>
</html>
