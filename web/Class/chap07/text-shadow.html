<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>text-shadow</title>
    <style>
      h1 {
        font-size: 60px;
      }
      /* Do it! text-shadow 속성으로 텍스트 그림자 추가하기 */
      .shadow1 {
        color: magenta;
        text-shadow: 7px 2px greenyellow;
      }
      .shadow2 {
        text-shadow: 5px 5px 3px #ffa500;
      }
      .shadow3 {
        color: fff;
        text-shadow: 7px -7px 15px #000;
      }
    </style>
  </head>
  <body>
    <h1 class="shadow1">CHI</h1>
    <h1 class="shadow2">I</h1>
    <h1 class="shadow3">KAWA</h1>
  </body>
</html>
