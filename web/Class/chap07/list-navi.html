<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>세로메뉴</title>
    <style>
      /* 세로 메뉴를 위한 스타일 지정 */

      nav {
        width: 300px;
        margin: 50px 30px;
      }
      ul {
        list-style-image: none;
      }
      li {
        border: 1px solid #222;
        padding: 20px 40px;
        margin: 5px;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <nav>
      <ul>
        <li><i class="fa-solid fa-icons"></i>회사소개</li>
        <li><i class="fa-solid fa-house"></i>도서</li>
        <li><i class="fa-jelly fa-regular fa-address-card"></i>자료실</li>
        <li><i class="fa-jelly fa-regular fa-arrow-up"></i>동영상강의</li>
      </ul>
    </nav>
  </body>
</html>
