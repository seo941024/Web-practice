<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>text-align</title>
    <style>
      p {
        width: 410px;
        border: 1px solid #222;
        padding: 10px;
        margin: 10px;
        font-size: 1.1em;
      }
      .small-line {
        line-height: 0.7em;
      }
      .big-line {
        line-height: 2.5em;
      }
      .right {
        text-align: right;
      }

      .cneter {
        text-align: center;
      }

      .justify {
        text-align: justify;
      }
      /* Do it! 텍스트 정렬 방법 지정하기 */
    </style>
  </head>
  <body>
    <!--기본정렬-->
    <p class="right">
      껍질에 붉은 빛이 돌아 <b>레드향</b>이라 불린다. 레드향은 한라봉과 귤을
      교배한 것으로 일반 귤보다 2~3배 크고, 과육이 붉고 통통하다.
    </p>
    <!--가운데정렬-->
    <p class="center">
      껍질에 붉은 빛이 돌아 <b>레드향</b>이라 불린다. 레드향은 한라봉과 귤을
      교배한 것으로 일반 귤보다 2~3배 크고, 과육이 붉고 통통하다.
    </p>
    <!--양쪽정렬-->
    <p class="justify">
      껍질에 붉은 빛이 돌아 <b>레드향</b>이라 불린다. 레드향은 한라봉과 귤을
      교배한 것으로 일반 귤보다 2~3배 크고, 과육이 붉고 통통하다.
    </p>
  </body>
</html>
