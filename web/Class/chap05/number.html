<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>레드향 주문하기</title>
</head>
<body>
  <h1>레드향 주문하기</h1>
  <form>
    <fieldset>
      <legend><strong>주문자 정보</strong></legend>
      <label>주문자 ID <input type="text" name="userid"/></label>
    </fieldset>
    <fieldset>
      <legend><b>상품 선택</b></legend>
      <!-- Do it! 스핀 박스를 사용해 숫자 입력하기 -->

      <p><b>주문할 상품을 선택해 주세요.</b></p>
      <ul>
        <li>
          <input type="checkbox" name="order" id="p3"><label for = "p3">선물용 3k
            <input type="number" min="0" max="5" >개 (최대 5개)
        </li>
        <li>
          <input type="checkbox" name="order" id="p5"><label for = "p3">선물용 3k
            <input type="number" min="0" max="3" value="1">개 (최대 3개)
        </li>
        <li>
          <input type="checkbox" name="order" id="h3"><label for = "p3">가정용 3k
            <input type="number" min="0" max="5">개 (최대 5개)
        </li>
        <li>
          <input type="checkbox" name="order" id="h5"><label for = "p3">가정용 3k
            <input type="number" min="0" max="3" value="1">개 (최대 3개)
        </li>
      </ul>   
      <p><b>포장 선택</b></p>
        <ul>
          <li><label><input type="radio" name="gift" value="yes">선물 포장</label></li>
          <li><label><input type="radio" name="gift" value="yes">선물 포장 안함</label></li>
        </ul>
           
    </fieldset>
    <fieldset>
      <legend><b>배송 정보</b></legend>
      <ul>
        <li>
          <label for="user-name">이름 </label>
          <input type="text" id="user-name">
        </li>
        <li>
          <label for="addr">배송 주소</label>
          <input type="text" id="addr">
        </li>
        <li>
          <label for="mail">메일 주소</label>
          <input type="email" id="mail">
        </li>        
        <li>
          <label for="phone">연락처</label>
          <input type="tel" id="phone">
        </li>
      </ul>  
    </fieldset>      
    <input type="submit" value="제출완료" />
    <input type="reset" value="취소하기" />
  </form>
</body>
</html>
