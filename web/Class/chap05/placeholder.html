<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>레드향 주문하기</title>
    <link rel="stylesheet" href="css/order.css" />
  </head>
  <body>
    <div id="container">
      <h1>레드향 주문하기</h1>
      <form>
        <fieldset>
          <legend>배송 정보</legend>
          <!-- Do it! 이름에 autofocus, 연락처에 placeholder 추가하기 -->
          <ul id="shipping">
            <li>
              <label>주문상품 </label>
              <input type="text" readonly value="상품용 3KG" />
            </li>
            <li>
              <label for="user-name">이름 </label>
              <input type="text" id="user-name" value="피카츄" required />
            </li>
            <li>
              <label for="addr">배송 주소</label>
              <input type="text" id="addr" autofocus required />
            </li>
            <li>
              <label for="mail">이메일</label>
              <input type="email" id="mail" required />
            </li>
            <li>
              <label for="phone">연락처</label>
              <input
                type="tel"
                id="phone"
                placeholder="하이픈 배고 입력해 주세요.(01012345678)"
                required
              />
            </li>
            <li>
              <label for="d-day">배송 지정</label>
              <input type="date" id="d-day" />
              <small>(주문일로부터 최소 3일 이후)</small>
            </li>
            <li>
              <textarea
                placeholder="여태까지한번도경험해보지못했던맛있는맛이에요진짜이거나말고다른사람도알아야하는데글로만표현해야한다니너무아쉽구요주변에친척과친구들에게전부알려줬는데다들샀는지는모르겠어요저는벌써300번째주문인데서비스좀주세요주실꺼요?주세요안주면신고할게요"
              ></textarea>
            </li>
          </ul>
        </fieldset>
        <div id="buttons">
          <input type="submit" value="주문하기" />
          <input type="reset" value="취소하기" />
        </div>
      </form>
    </div>
  </body>
</html>
