<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>플렉스 박스 레이아웃</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    .container {
      width:700px;
      display:flex; /* 플렉스 컨테이너 지정 */
      background-color:#eee;
      border:1px solid #222;
      gap:10px;
    }
    .box {
      background-color: #000;
      color: #fff;
      padding: 10px 0px;
      text-align: center;
      /* 플렉스 항목의 기본 크기 지정 */
      flex-basis: 150px;
    }   
  </style>
</head>
<body>
  <div class="container">
    <div class="box" id="box1">가나다라마</div>
    <div class="box" id="box2">가나다라마바사</div>
    <div class="box" id="box3">ABCDE</div>
  </div>          
</body>
</html>
