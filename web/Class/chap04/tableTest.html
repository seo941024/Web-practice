<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!--4행 3열의 테이블 만들기-->
    <table border>
      <caption>
        테이블 제목인데
        <br />제목이 이렇게 길면 어떻게 될까요
      </caption>
      <thead>
        <tr>
          <th>1행 1열</th>
          <!--제목 행-->
          <th>1행 2열</th>
          <th>1행 3열</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>2행 1열</td>
          <td colspan="2">2행 2열</td>
          <!--<td>2행 3열</td>-->
        </tr>
        <tr>
          <td rowspan="2">3행 1열</td>
          <td>3행 2열</td>
          <td>3행 3열</td>
        </tr>
        <tr>
          <!--<td>4행 1열</td>-->
          <td>4행 2열</td>
          <td>4행 3열</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
